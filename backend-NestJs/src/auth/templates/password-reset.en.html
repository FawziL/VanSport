<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px;">
  <div style="max-width: 480px; margin: auto; background: white; border-radius: 12px; padding: 32px;">
    <h2 style="margin-top: 0; color: #1a1a1a;">Password Reset</h2>
    <p style="color: #555; line-height: 1.6;">
      You requested to reset your password at <strong>VanSport</strong>.
    </p>
    <p style="color: #555; line-height: 1.6;">
      Click the button below to create a new password:
    </p>
    <div style="text-align: center; margin: 24px 0;">
      <a href="{{url}}"
         style="display: inline-block; background: #1e88e5; color: white; text-decoration: none;
                padding: 14px 28px; border-radius: 8px; font-weight: 700; font-size: 16px;">
        Reset Password
      </a>
    </div>
    <p style="color: #888; font-size: 13px; line-height: 1.5;">
      If you didn't request this, ignore this email.
      The link expires in 1 hour.
    </p>
    <hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;">
    <p style="color: #aaa; font-size: 12px; text-align: center;">
      VanSport — Everything you need for your home, all in one place.
    </p>
  </div>
</body>
</html>
